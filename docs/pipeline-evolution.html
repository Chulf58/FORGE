<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FORGE — Pipeline Evolution</title>
<style>
:root {
  --gold: #e0c060;
  --gold-dim: #a08840;
  --bg: #111420;
  --card: #1a1e2c;
  --border: #303448;
  --text: #f4f4f4;
  --dim: #9098b0;

  /* Established (blue) agents */
  --est-bg: #142038;
  --est-border: #2e5888;
  --est-text: #80c8f8;
  --est-dot: #4890d0;

  /* New (green) agents */
  --new-bg: #102c1c;
  --new-border: #2a7048;
  --new-text: #60d888;
  --new-dot: #3aaa58;

  /* Triage agents — purple */
  --tri-bg: #1e1440;
  --tri-border: #5038b8;
  --tri-text: #c090ff;
  --tri-dot: #9060d8;

  /* Audit agents — lilac */
  --aud-bg: #201630;
  --aud-border: #603888;
  --aud-text: #d0a0f0;
  --aud-dot: #a870c8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Slide shell ── */
#deck { flex: 1; position: relative; overflow: hidden; }

.slide {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
}
.slide.active { display: flex; }

/* ── Header ── */
.hd {
  flex-shrink: 0;
  padding: 12px 28px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 14px;
}
.era-lbl {
  font-size: 12px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--gold);
  flex-shrink: 0;
}
.slide-title { font-size: 20px; font-weight: 700; }
.slide-sub { font-size: 13px; color: var(--dim); margin-left: auto; font-style: italic; }

/* ── Body ── */
.body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1px 380px;
  grid-template-rows: minmax(0, 1fr);
  min-height: 0;
  overflow: hidden;
}
.col-div { background: var(--border); }

/* ── FORGE column ── */
.forge-col {
  position: relative;
  overflow: hidden;
  min-height: 0;
  padding: 10px 14px 8px;
  display: flex; flex-direction: column;
}
.forge-inner {
  transform-origin: top left;
  flex-shrink: 0;
}

/* ── Phase divider ── */
.phase {
  display: flex; align-items: center; gap: 8px;
  margin: 5px 0 3px;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: #5a6070;
}
.phase::after { content:''; flex:1; height:1px; background:#303448; }

/* ── Revision loop inline chip ── */
.rev-chip {
  display: inline-flex; align-items: center;
  padding: 2px 6px; border-radius: 3px;
  font-size: 12px; color: #c89040;
  background: #221a08; border: 1px solid #786030;
  flex-shrink: 0; white-space: nowrap;
}
.col-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; margin-bottom: 10px;
}
.col-lbl.forge { color: var(--gold); }
.col-lbl.cmp   { color: #5090b8; }
.col-lbl.gsd   { color: #58a060; }

/* ── Compare column ── */
.cmp-col {
  padding: 14px 16px 10px;
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
  /* opacity set per-slide via JS */
}
.cmp-block { display: flex; flex-direction: column; gap: 8px; }
.cmp-block + .cmp-block { padding-top: 14px; border-top: 1px solid var(--border); }

/* ── Description bar ── */
.desc-bar {
  flex-shrink: 0;
  padding: 8px 28px;
  border-top: 1px solid var(--border);
  background: #181c28;
  font-size: 13px; color: #b0b8cc; line-height: 1.5;
  min-height: 36px;
}
.desc-bar strong { color: #90d8a8; }

/* ── Pipeline rows ── */
.pipe { display: flex; flex-direction: column; gap: 5px; }
.row  { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.row-lbl {
  font-size: 10px; color: var(--dim); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 1px;
}

/* ── Agent box ── */
.ag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 5px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap; border: 1px solid transparent;
  transition: box-shadow 0.3s;
}
.ag .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* Established — blue */
.ag.est { background: var(--est-bg); border-color: var(--est-border); color: var(--est-text); }
.ag.est .dot { background: var(--est-dot); }

/* New — green */
.ag.new { background: var(--new-bg); border-color: var(--new-border); color: var(--new-text); box-shadow: 0 0 8px #1a5a2a60; }
.ag.new .dot { background: var(--new-dot); }

/* Triage — purple (always established colour once introduced) */
.ag.tri { background: var(--tri-bg); border-color: var(--tri-border); color: var(--tri-text); }
.ag.tri .dot { background: var(--tri-dot); }
.ag.tri.new { box-shadow: 0 0 8px #4a20a060; }

/* Audit — lilac */
.ag.aud { background: var(--aud-bg); border-color: var(--aud-border); color: var(--aud-text); }
.ag.aud .dot { background: var(--aud-dot); }
.ag.aud.new { box-shadow: 0 0 8px #6020a060; }

/* Plain (compare side) */
.ag.plain { background: #1e2030; border-color: #303448; color: #6068a0; }
.ag.plain .dot { background: #404060; }
.ag.user  { background: #22200e; border-color: #5a5020; color: var(--gold); }
.ag.user .dot { background: var(--gold-dim); }

/* ── Gate ── */
.gate {
  display: inline-flex; align-items: center;
  padding: 5px 12px; border-radius: 5px;
  font-size: 12px; font-weight: 700;
  background: #201c00; border: 2px solid var(--gold-dim); color: var(--gold);
  white-space: nowrap;
}
.gate.new { box-shadow: 0 0 12px #e0c06080; }

/* ── Arrow ── */
.arr { color: #505870; font-size: 13px; padding: 0 1px; }

/* ── Groups ── */
.grp {
  display: flex; flex-direction: column; gap: 4px;
  padding: 7px 9px; border-radius: 6px;
}
.grp.par { border: 1px dashed #2a4060; background: #0e1828; }
.grp.par.new { border-color: #2a6050; background: #0e2018; box-shadow: 0 0 10px #2a7a4840; }
.grp.wave { border: 1px dashed #204040; background: #0e1c1c; }
.grp.wave.new { box-shadow: 0 0 10px #2a7a4840; }
.grp-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 2px;
}
.grp.par .grp-lbl  { color: #5090b8; }
.grp.wave .grp-lbl { color: #509050; }
.grp.par.new .grp-lbl  { color: var(--new-text); }
.grp.wave.new .grp-lbl { color: var(--new-text); }

/* ── Injection badge ── */
.inj {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 4px;
  font-size: 10px;
  background: #1c1830; border: 1px solid #5040a8; color: #b898f8;
  white-space: nowrap;
}
.inj.new { box-shadow: 0 0 8px #7050d060; border-color: #6858d8; color: #d0b0ff; }

/* ── Signal chips ── */
.sigs { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.sig {
  padding: 2px 7px; border-radius: 3px;
  font-size: 10px; font-family: monospace;
  background: #201c0c; border: 1px solid #504820; color: #c8b060;
}
.sig.new { border-color: #687028; color: #e0d070; box-shadow: 0 0 6px #a0a03040; }

/* ── Mode table ── */
.modes { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
.mode-row { display: flex; align-items: center; gap: 6px; }
.mode-tag {
  padding: 2px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  white-space: nowrap;
}
.mode-tag.sprint { background: #0c2010; border: 1px solid #387030; color: #88e048; }
.mode-tag.lean   { background: #102828; border: 1px solid #307878; color: #60d0d0; }
.mode-tag.std    { background: #282810; border: 1px solid #787830; color: #d8d050; }
.mode-tag.full   { background: #200e28; border: 1px solid #703878; color: #c868d8; }
.mode-desc { font-size: 10px; color: #707890; }

/* ── Navigation ── */
#nav {
  height: 40px; background: #080808;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; padding: 0 20px;
  flex-shrink: 0;
}
.nbtn {
  padding: 5px 16px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.nbtn:hover { border-color: var(--gold); color: var(--gold); }
.nbtn:disabled { opacity: .3; cursor: default; }
.nbtn:disabled:hover { border-color: var(--border); color: var(--text); }

#prog { display: flex; align-items: center; gap: 10px; }
#ctr { font-size: 11px; color: var(--dim); min-width: 52px; text-align: center; }
.dots { display: flex; gap: 4px; }
.dot-nav {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); cursor: pointer;
  transition: background .15s;
}
.dot-nav.on { background: var(--gold); }
.dot-nav:hover { background: var(--gold-dim); }

/* ── Orchestrator box ── */
.ag.orc { background: #20180a; border-color: #806030; color: #d0a848; }
.ag.orc .dot { background: #907830; }

/* ── Fan dispatch layout (triage → individual agents) ── */
.fan { display: inline-flex; align-items: center; gap: 6px; }
.fan-body { display: flex; flex-direction: column; gap: 3px; }
.fan-row { display: flex; align-items: center; gap: 4px; }

/* ── Triage deep-dive slide ── */
.triage-board {
  display: flex; flex-direction: column; gap: 5px;
  border: 1px solid #2a4060; border-radius: 7px;
  padding: 8px 12px; background: #0e1828;
  align-self: center;
}
.tri-row { display: flex; align-items: center; gap: 6px; }
.tri-row.skipped { opacity: 0.72; }
.expt {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 7px; border-radius: 3px; min-width: 136px;
  font-size: 10px; font-family: monospace;
  background: #141e30; border: 1px solid #305878; color: #88c0e8;
  white-space: nowrap;
}
.skip-note { font-size: 10px; color: #7090a8; min-width: 136px; text-align: center; font-style: italic; }
.skip-ag {
  display: inline-flex; align-items: center;
  padding: 4px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 600;
  background: #181c28; border: 1px dashed #404858; color: #6870a0;
}
.skip-mark { color: #c04848; font-size: 12px; font-weight: 700; flex-shrink: 0; }

/* ── Mode deep-dive slide ── */
.mode-block { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; border-radius: 6px; margin: 2px 0; }
.mode-block.sprint { background: #0e1e10; border: 1px solid #2e6828; }
.mode-block.lean   { background: #0e2020; border: 1px solid #307070; }
.mode-block.std    { background: #201e08; border: 1px solid #707030; }
.mode-block.full   { background: #1a0e20; border: 1px solid #683878; }
.mode-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.mode-note { font-size: 10px; }
.mode-block.sprint .mode-note { color: #80d858; }
.mode-block.lean   .mode-note { color: #60b8b8; }
.mode-block.std    .mode-note { color: #b8b048; }
.mode-block.full   .mode-note { color: #c070d0; }

/* ── Capability matrix ── */
.cap-matrix { display: grid; grid-template-columns: 1.6fr repeat(5, 1fr); border: 1px solid #2a2e48; border-radius: 8px; overflow: hidden; }
.cap-c { padding: 5px 8px; border-bottom: 1px solid #1e2238; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.cap-c.lbl { justify-content: flex-start; color: var(--dim); font-size: 10px; background: #14182a; padding-left: 10px; }
.cap-c.hdr { background: #1c2038; font-weight: 700; font-size: 10px; padding: 7px 6px; flex-direction: column; gap: 2px; }
.cap-c:last-child, .cap-c.no-border { border-bottom: none; }
.cap-yes  { color: #60d870; font-size: 15px; font-weight: 700; }
.cap-no   { color: #30344a; font-size: 15px; }
.cap-part { color: #c8a040; font-size: 9px; text-align: center; line-height: 1.3; }
.cap-cost { font-size: 9px; font-weight: 700; text-align: center; line-height: 1.3; }
.cap-best { font-size: 8px; color: var(--dim); text-align: center; line-height: 1.4; font-style: italic; }
.cap-gsd  { background: #141820; }
.cap-spr  { background: #0e1c12; }
.cap-lean { background: #0e1c1c; }
.cap-std  { background: #1c1c0c; }
.cap-full { background: #180e1c; }

/* ── Signal deep-dive slide ── */
.sig-table { display: flex; flex-direction: column; gap: 5px; }
.sig-row { display: flex; align-items: baseline; gap: 8px; }
.sig-chip-lbl {
  font-size: 10px; font-family: monospace;
  padding: 2px 7px; border-radius: 3px;
  background: #201c0c; border: 1px solid #504820; color: #c8b060;
  white-space: nowrap; flex-shrink: 0; min-width: 148px; text-align: center;
}
.sig-chip-lbl.new { border-color: #687028; color: #e0d070; }
.sig-arrow { color: #4a9060; font-size: 11px; flex-shrink: 0; }
.sig-effect { font-size: 10px; color: #8898a8; line-height: 1.4; flex: 1; }
.sig-ui-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
  white-space: nowrap;
}
.sig-ui-tag.gate  { background: #20180a; border: 1px solid #705820; color: #c09040; }
.sig-ui-tag.ui    { background: #101828; border: 1px solid #284870; color: #6090c0; }
.sig-ui-tag.loop  { background: #1c1010; border: 1px solid #502828; color: #c04848; }
.sig-ui-tag.board { background: #101c10; border: 1px solid #285028; color: #60b060; }
.sig-ui-tag.tab   { background: #140e20; border: 1px solid #382858; color: #9070c0; }
.sig-ui-tag.wave  { background: #0e1c20; border: 1px solid #285058; color: #58a8b8; }
.sig-divider { border: none; border-top: 1px solid #252838; margin: 2px 0; }

/* ── Tooltip trigger indicator ── */
[data-tip] { cursor: help; }
[data-tip]:hover { filter: brightness(1.25); }

/* ── Tooltip popup ── */
#tip {
  position: fixed; z-index: 9999;
  max-width: 300px;
  background: #1e2238; border: 1px solid #404868;
  border-radius: 7px; padding: 10px 14px;
  font-size: 13px; color: #d8dce8; line-height: 1.6;
  box-shadow: 0 8px 28px #00000090;
  pointer-events: none;
  opacity: 0; transition: opacity 0.12s;
}
#tip.show { opacity: 1; }
#tip strong { color: var(--gold); }

/* ── New pip on agent ── */
.new-pip {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--new-text); flex-shrink: 0;
  animation: pulse-pip 1.6s ease-in-out infinite;
}
@keyframes pulse-pip { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div id="deck"></div>
<div id="nav">
  <button class="nbtn" id="prev" onclick="go(-1)" disabled>← Prev</button>
  <div id="prog"><div class="dots" id="dots"></div><span id="ctr"></span></div>
  <button class="nbtn" id="next" onclick="go(1)">Next →</button>
</div>

const a = (label, cls, isNew, tip='') => {
  const t = tip || TIPS[label] || '';
  return `<div class="ag ${cls}${isNew?' new':''}" ${t?`data-tip="${t.replace(/"/g,'&quot;')}"`:''} >${isNew?'<span class="new-pip"></span>':''}<span class="dot"></span>${label}</div>`;
};

const est = (label, cls='est', tip='') => a(label, cls, false, tip);
const nw  = (label, cls='est', tip='') => a(label, cls, true,  tip);
const arrow = () => `<span class="arr">→</span>`;
const gate  = (label, isNew, tip='') => {
  const t = tip || TIPS[label] || '';
  return `<div class="gate${isNew?' new':''}" ${t?`data-tip="${t.replace(/"/g,'&quot;')}"`:''} >${label}</div>`;
};
const row   = (...items) => `<div class="row">${items.join('')}</div>`;
const rlbl  = t => `<div class="row-lbl">${t}</div>`;
const phase = t => `<div class="phase">${t}</div>`;
const revchip = (isplan=false) => {
  const tip = isplan
    ? 'if REVISE → planner revises PLAN.md · only failing reviewers rerun · max 3 cycles · cap hit: escalates to you'
    : 'if REVISE → coder revises handoff · reviewers rerun · max 2 cycles · cap hit: escalates to you';
  return `<span class="rev-chip" data-tip="${tip}">↺</span>`;
};

const par = (isNew, lbl, ...items) =>
  `<div class="grp par${isNew?' new':''}">
    <div class="grp-lbl">${lbl}</div>
    <div class="row">${items.join('')}</div>
  </div>`;

const wave = (isNew, lbl, ...rows) =>
  `<div class="grp wave${isNew?' new':''}">
    <div class="grp-lbl">${lbl}</div>
    ${rows.join('')}
  </div>`;

const inj = (icon, text, isNew) =>
  `<div class="inj${isNew?' new':''}">${icon} ${text}</div>`;

const SIG_TIPS = {
  '[suggest]':          'An agent output a follow-up suggestion. Appears as a chip in the prompt area; click to pre-fill it as your next message.',
  '[todo]':             'Agent created a new TODO item on the board automatically during this run.',
  '[summary]':          'End-of-pipeline summary. Intercepted by the orchestrator to build the Gate #1 or Gate #2 approval dialog — not shown raw.',
  '[reviewer-verdict]': 'Structured verdict from a reviewer: APPROVED, REVISE, or BLOCK, plus blocker and warning counts. Intercepted — the orchestrator reads it to decide whether to loop, proceed, or escalate.',
  '[wave-complete]':    'Implementer finished one wave of parallel tasks. Orchestrator uses this to sequence the next wave.',
  '[health]':           'Health warning emitted by the architect or integrity-checker. Surfaced in the HEALTH tab as a flagged item.',
  '[questions]':        'Planner detected ambiguity. Questions shown in the QA strip for you to answer; planner reruns with your answers before the pipeline continues.',
  '[/questions]':       'Closes the [questions] block. Everything between [questions] and [/questions] is the list of questions shown in the QA strip.',
  '[auditor-recurring]':'Tool-call auditor found a pattern that repeats across multiple runs (e.g. the same file read 5+ times). Triggers the agent-optimizer to propose a prompt fix.',
  '[brief-for: N]':     'researcher-triage output: one focused brief per research question. Orchestrator dispatches one researcher instance per brief, running in parallel.',
};

// Fan dispatch: triage agent fans out to individual target agents
const fan = (src, ...targets) =>
  `<div class="fan">${src}<div class="fan-body">${targets.map(t=>`<div class="fan-row">${arrow()}${t}</div>`).join('')}</div></div>`;

const sigs = (chips) =>
  `<div class="sigs">${chips.map(([t,n]) => {
    const tip = SIG_TIPS[t] || '';
    return `<span class="sig${n?' new':''}" ${tip?`data-tip="${tip.replace(/"/g,'&quot;')}"`:''} >${t}</span>`;
  }).join('')}</div>`;

// Render slides
// ─────────────────────────────────────────────────────────
const deck = document.getElementById('deck');
const dotsEl = document.getElementById('dots');
let current = 0;

slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i===0?' active':'');
  el.innerHTML = `
    <div class="hd">
      <span class="era-lbl">${s.era}</span>
      <span class="slide-title">${s.title}</span>
      <span class="slide-sub">${s.sub}</span>
    </div>
    <div class="body">
      <div class="forge-col">
        <div class="col-lbl forge">FORGE</div>
        <div class="forge-inner" style="transform-origin:top left;">
          ${s.noYouRow ? '' : row( est('You','user'), arrow(), est('orchestrator','orc') )}
          ${s.forge()}
        </div>
      </div>
      <div class="col-div"></div>
      <div class="cmp-col" style="opacity:${s.fade}">${cmpHTML}</div>
    </div>
    <div class="desc-bar">${s.desc}</div>`;
  deck.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'dot-nav' + (i===0?' on':'');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
});

function autoScale() {
  const slide    = document.querySelectorAll('.slide')[current];
  const forgeCol = slide.querySelector('.forge-col');
  const inner    = slide.querySelector('.forge-inner');
  if (!inner || !forgeCol) return;

  // Only pipeline era slides get nowrap rows — deep-dives and custom-layout slides keep wrap
  const era = slides[current].era || '';
  const isPipeline = /^Era /.test(era) || ['Sibling Pipelines', 'Direct Mode', 'Upcoming'].includes(era);
  inner.querySelectorAll('.row').forEach(r => { r.style.flexWrap = isPipeline ? 'nowrap' : ''; });
  inner.querySelectorAll('.pipe').forEach(p => { p.style.minWidth = isPipeline ? 'max-content' : ''; });

  inner.style.transform = 'scale(1)';
  const availH = forgeCol.clientHeight - inner.offsetTop - 8;
  const availW = forgeCol.clientWidth - 28;
  const naturalH = inner.scrollHeight;
  const naturalW = inner.scrollWidth;
  const scaleH = naturalH > availH ? availH / naturalH : 1;
  const scaleW = naturalW > availW ? availW / naturalW : 1;
  const s = Math.max(0.20, Math.min(scaleH, scaleW));
  if (s < 1) inner.style.transform = `scale(${s})`;
}

function goTo(n) {
  document.querySelectorAll('.slide')[current].classList.remove('active');
  dotsEl.children[current].classList.remove('on');
  current = Math.max(0, Math.min(slides.length-1, n));
  document.querySelectorAll('.slide')[current].classList.add('active');
  dotsEl.children[current].classList.add('on');
  document.getElementById('ctr').textContent = (current+1)+' / '+slides.length;
  document.getElementById('prev').disabled = current===0;
  document.getElementById('next').disabled = current===slides.length-1;
  requestAnimationFrame(autoScale);
}

function go(d) { goTo(current+d); }
goTo(0);

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
window.addEventListener('resize', () => requestAnimationFrame(autoScale));

// ── Tooltip system ──
const tipEl = document.createElement('div');
tipEl.id = 'tip';
document.body.appendChild(tipEl);

let tipTimeout;
deck.addEventListener('mouseover', e => {
  const target = e.target.closest('[data-tip]');
  if (!target) return;
  clearTimeout(tipTimeout);
  tipEl.innerHTML = target.dataset.tip;
  // Position near cursor but keep in viewport
  const pad = 14;
  let x = e.clientX + 16;
  let y = e.clientY + 12;
  tipEl.style.left = '0'; tipEl.style.top = '0';
  tipEl.classList.add('show');
  const tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
  if (x + tw > window.innerWidth - pad) x = e.clientX - tw - 12;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - 12;
  tipEl.style.left = x + 'px';
  tipEl.style.top  = y + 'px';
});

deck.addEventListener('mousemove', e => {
  if (!tipEl.classList.contains('show')) return;
  const target = e.target.closest('[data-tip]');
  if (!target) return; // don't hide here — only update position when over a tip element
  clearTimeout(tipTimeout);
  const pad = 14;
  let x = e.clientX + 16, y = e.clientY + 12;
  const tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
  if (x + tw > window.innerWidth - pad) x = e.clientX - tw - 12;
  if (y + th > window.innerHeight - pad) y = e.clientY - th - 12;
  tipEl.style.left = x + 'px';
  tipEl.style.top  = y + 'px';
});

deck.addEventListener('mouseout', e => {
  const target = e.target.closest('[data-tip]');
  if (!target) return;
  // Ignore transitions between children of the same [data-tip] element
  if (target.contains(e.relatedTarget)) return;
  tipTimeout = setTimeout(() => tipEl.classList.remove('show'), 120);
});
</script>
